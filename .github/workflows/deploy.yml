name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            APP_DIR=/home/eigengrid/eigengrid
            cd "$APP_DIR"

            git pull origin main

            # Backend
            cd backend
            /usr/local/bin/composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan tinker --execute='$u=App\Models\User::where("email","eliseoalejandro.huetagoyena@gmail.com")->first(); echo "AUTH_CHECK user_exists=".($u?"yes":"no").PHP_EOL; echo "AUTH_CHECK total_users=".App\Models\User::count().PHP_EOL; if($u){ echo "AUTH_CHECK expected_password_match=".(Illuminate\Support\Facades\Hash::check("EigenGrid2024!",$u->password)?"yes":"no").PHP_EOL; }'

            # Frontend
            cd ../frontend
            npm install
            npm run build

            # SSH Bridge
            cd ssh-bridge
            npm install --omit=dev

            # Resolve env file for SSH Bridge
            # Preferred: dedicated bridge env file. Fallback: backend env file.
            SSH_BRIDGE_ENV_FILE="$APP_DIR/frontend/ssh-bridge/.env"
            if [ ! -f "$SSH_BRIDGE_ENV_FILE" ]; then
              SSH_BRIDGE_ENV_FILE="$APP_DIR/backend/.env"
            fi

            if [ ! -f "$SSH_BRIDGE_ENV_FILE" ]; then
              echo "ERROR: Missing env file for ssh-bridge."
              echo "Create $APP_DIR/frontend/ssh-bridge/.env or $APP_DIR/backend/.env"
              exit 1
            fi

            # Restart services
            export PATH=$PATH:/usr/local/bin
            pm2 restart eigengrid-frontend eigengrid-backend

            # Recreate SSH Bridge so node args/env-file are always applied
            pm2 delete eigengrid-ssh-bridge > /dev/null 2>&1 || true
            pm2 start index.js \
              --name eigengrid-ssh-bridge \
              --cwd "$APP_DIR/frontend/ssh-bridge" \
              --node-args="--env-file=$SSH_BRIDGE_ENV_FILE"
